<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>プロスペ 基準価格</title>
  <meta name="theme-color" content="#0c1a32">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="プロスペ">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png" type="image/png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #0c1a32;
      color: #fff;
      font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 32px 20px 48px;
      gap: 0;
    }

    /* ===== 共通ボタン ===== */
    .main-btn {
      display: block;
      background: #f5a623;
      color: #0c1a32;
      border: none;
      border-radius: 60px;
      font-size: 28px;
      font-weight: bold;
      padding: 22px 0;
      width: 100%;
      max-width: 400px;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 4px 18px rgba(245,166,35,0.4);
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none;
      text-align: center;
    }
    .main-btn:active {
      opacity: 0.85;
      transform: scale(0.97);
    }
    .main-btn:disabled {
      opacity: 0.55;
      cursor: default;
    }

    /* ===== ファンド名 ===== */
    .fund-name {
      font-size: 18px;
      color: #f5a623;
      font-weight: bold;
      text-align: center;
      letter-spacing: 0.5px;
      margin-top: 32px;
      margin-bottom: 6px;
    }
    .fund-sub {
      font-size: 14px;
      color: #7a9cbf;
      text-align: center;
      margin-bottom: 40px;
    }

    /* ===== 価格メイン ===== */
    .price-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .price-label {
      font-size: 20px;
      color: #aac0d8;
      margin-bottom: 12px;
      letter-spacing: 1px;
    }

    .price-value {
      font-size: 88px;
      font-weight: bold;
      letter-spacing: -3px;
      line-height: 1;
      color: #ffffff;
      margin-bottom: 20px;
    }

    .price-change {
      font-size: 44px;
      font-weight: bold;
      line-height: 1.2;
    }
    .price-change.up   { color: #2ecc71; }
    .price-change.down { color: #e74c3c; }
    .price-change.flat { color: #aaa;    }

    .price-pct {
      font-size: 32px;
      font-weight: bold;
      margin-top: 6px;
    }
    .price-pct.up   { color: #2ecc71; }
    .price-pct.down { color: #e74c3c; }
    .price-pct.flat { color: #aaa;    }

    /* ===== 日付 ===== */
    .price-date {
      font-size: 20px;
      color: #7a9cbf;
      margin-top: 24px;
      text-align: center;
      line-height: 1.6;
    }

    /* ===== 区切り ===== */
    .divider {
      width: 80%;
      max-width: 360px;
      height: 2px;
      background: rgba(245,166,35,0.25);
      margin: 36px 0;
    }

    /* ===== チャート ===== */
    .chart-wrap {
      width: 100%;
      max-width: 500px;
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 16px 12px;
    }
    .chart-title {
      font-size: 16px;
      color: #aac0d8;
      text-align: center;
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }
    .chart-loading {
      font-size: 14px;
      color: #7a9cbf;
      text-align: center;
      padding: 32px 0;
    }

    /* ===== エラー ===== */
    .error-msg {
      font-size: 18px;
      color: #e74c3c;
      text-align: center;
      margin-top: 12px;
    }

    /* スマホ最適化 */
    @media (max-width: 480px) {
      .price-value  { font-size: 72px; }
      .price-change { font-size: 36px; }
      .price-pct    { font-size: 28px; }
      .main-btn     { font-size: 24px; padding: 20px 0; }
    }
  </style>
</head>
<body>

  <!-- 🔄 更新ボタン（最上部） -->
  <button class="main-btn" id="reload-btn" onclick="loadData()">
    🔄 最新に更新
  </button>

  <div class="fund-name">プロスペ</div>
  <div class="fund-sub">グローバル・プロスペクティブ・ファンド</div>

  <div class="price-wrap">
    <div class="price-label">📌 基準価格（1万口あたり）</div>
    <div class="price-value" id="price-val">---</div>
    <div class="price-change flat" id="price-chg">---</div>
    <div class="price-pct  flat" id="price-pct">---</div>
    <div class="price-date" id="price-date">読み込み中…</div>
    <div class="error-msg" id="error-msg" style="display:none"></div>
  </div>

  <div class="divider"></div>

  <!-- チャート -->
  <div class="chart-wrap">
    <div class="chart-title">📈 基準価格の推移（全期間）</div>
    <div class="chart-loading" id="chart-loading">読み込み中…</div>
    <canvas id="priceChart" style="display:none"></canvas>
  </div>

  <div class="divider"></div>

  <!-- チャートグラフを見る（詳細ページへ） -->
  <a class="main-btn" href="index.html">
    📊 チャートグラフを見る
  </a>

<script>
  const CURRENT_CSV = 'https://docs.google.com/spreadsheets/d/13gQhvkm-opUl4hNHmDSZU1RmBAVLjzPcubRhSlrrZiI/export?format=csv&gid=0';
  const HISTORY_CSV = 'https://docs.google.com/spreadsheets/d/13gQhvkm-opUl4hNHmDSZU1RmBAVLjzPcubRhSlrrZiI/export?format=csv&gid=477403851';

  let chartInstance = null;

  function parseCSV(text) {
    return text.trim().split('\n').map(line =>
      line.split(',').map(c => c.trim().replace(/^"|"$/g, ''))
    );
  }

  function toDisplayDate(str) {
    if (!str) return '';
    let m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (m) return m[3] + '年' + parseInt(m[1]) + '月' + parseInt(m[2]) + '日';
    m = str.match(/^(\d{4})\/(\d{2})\/(\d{2})/);
    if (m) return m[1] + '年' + parseInt(m[2]) + '月' + parseInt(m[3]) + '日';
    m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return m[1] + '年' + parseInt(m[2]) + '月' + parseInt(m[3]) + '日';
    return str;
  }

  function toShortDate(str) {
    if (!str) return '';
    let m = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (m) return parseInt(m[1]) + '/' + parseInt(m[2]);
    m = str.match(/^(\d{4})\/(\d{2})\/(\d{2})/);
    if (m) return parseInt(m[2]) + '/' + parseInt(m[3]);
    m = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (m) return parseInt(m[2]) + '/' + parseInt(m[3]);
    return str;
  }

  async function loadData() {
    const btn = document.getElementById('reload-btn');
    const errEl = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = '取得中…';
    errEl.style.display = 'none';

    await Promise.all([loadCurrent(), loadChart()]);

    btn.disabled = false;
    btn.textContent = '🔄 最新に更新';
  }

  async function loadCurrent() {
    const errEl = document.getElementById('error-msg');
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(CURRENT_CSV + '&t=' + Date.now(), { signal: controller.signal });
      clearTimeout(timer);

      const rows = parseCSV(await res.text());
      if (rows.length < 2) throw new Error('データが空です');

      const row   = rows[1];
      const price = parseFloat(row[1]) || 0;
      const diff  = parseFloat(row[2]) || 0;
      const pct   = parseFloat(row[3]) || 0;
      const dateStr = toDisplayDate(row[0]);

      document.getElementById('price-val').textContent =
        '¥' + Math.round(price).toLocaleString('ja-JP');

      const sign = diff > 0 ? '▲' : diff < 0 ? '▼' : '－';
      const cls  = diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';

      const chgEl = document.getElementById('price-chg');
      chgEl.textContent = sign + ' ' + Math.abs(Math.round(diff)).toLocaleString('ja-JP') + '円';
      chgEl.className = 'price-change ' + cls;

      const pctEl = document.getElementById('price-pct');
      pctEl.textContent = '(' + (pct >= 0 ? '+' : '') + pct.toFixed(2) + '%)';
      pctEl.className = 'price-pct ' + cls;

      document.getElementById('price-date').textContent =
        dateStr + ' 時点の基準価格';

    } catch(e) {
      errEl.textContent = e.name === 'AbortError'
        ? '⚠ タイムアウト。しばらく待ってから再度お試しください。'
        : '⚠ データを取得できませんでした。';
      errEl.style.display = 'block';
      document.getElementById('price-date').textContent = '';
    }
  }

  async function loadChart() {
    const loadingEl = document.getElementById('chart-loading');
    const canvasEl  = document.getElementById('priceChart');
    try {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(HISTORY_CSV + '&t=' + Date.now(), { signal: controller.signal });
      clearTimeout(timer);

      const rows = parseCSV(await res.text());
      if (rows.length < 2) throw new Error('データなし');

      const dataRows = rows.slice(1).filter(r => r[0] && r[1]);
      const allLabels = dataRows.map(r => toShortDate(r[0]));
      const prices    = dataRows.map(r => parseFloat(r[1]) || 0);

      // ラベルを間引き（最大10個表示）
      const step = Math.max(1, Math.floor(allLabels.length / 10));
      const sparseLabels = allLabels.map((l, i) =>
        (i % step === 0 || i === allLabels.length - 1) ? l : ''
      );

      loadingEl.style.display = 'none';
      canvasEl.style.display  = 'block';

      if (chartInstance) chartInstance.destroy();
      chartInstance = new Chart(canvasEl.getContext('2d'), {
        type: 'line',
        data: {
          labels: sparseLabels,
          datasets: [{
            data: prices,
            borderColor: '#f5a623',
            backgroundColor: 'rgba(245,166,35,0.10)',
            borderWidth: 2.5,
            pointRadius: 0,
            fill: true,
            tension: 0.3,
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                title:  (items) => allLabels[items[0].dataIndex],
                label:  (item)  => '¥' + Math.round(item.raw).toLocaleString('ja-JP'),
              }
            }
          },
          scales: {
            x: {
              ticks: { color: '#7a9cbf', font: { size: 11 }, maxRotation: 0 },
              grid:  { color: 'rgba(255,255,255,0.05)' },
            },
            y: {
              ticks: {
                color: '#7a9cbf',
                font:  { size: 11 },
                callback: v => '¥' + Math.round(v / 1000) + 'k',
              },
              grid: { color: 'rgba(255,255,255,0.05)' },
            }
          }
        }
      });
    } catch(e) {
      loadingEl.textContent = '⚠ チャート取得失敗';
      console.warn('chart load failed', e);
    }
  }

  loadData();
</script>
</body>
</html>
